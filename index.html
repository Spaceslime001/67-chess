<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess 67</title>
<!-- chess.js for legal move validation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
:root {
  --bg:           #121212;
  --panel:        #1e1e1e;
  --panel2:       #252525;
  --panel3:       #2e2e2e;
  --border:       #333;
  --border2:      #3c3c3c;
  --green:        #779556;
  --light-sq:     #ebecd0;
  --dark-sq:      #779556;
  --text:         #d5d5d5;
  --dim:          #888;
  --dimmer:       #555;
  --brilliant:    #00bbcc;
  --great:        #6ba3d6;
  --best:         #8db065;
  --excellent:    #5aaa5a;
  --good:         #8fc87a;
  --book:         #b58fd8;
  --inaccuracy:   #e8c84a;
  --mistake:      #e8924a;
  --blunder:      #fa412d;
  --miss:         #e07a7a;
  --hl-yellow:    rgba(247,247,105,0.55);
  --hl-green:     rgba(100,200,100,0.45);
  --hl-select:    rgba(100,150,255,0.45);
  --hl-legal:     rgba(0,0,0,0.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;user-select:none;}

/* ── TOPBAR ── */
.topbar{flex-shrink:0;height:48px;display:flex;align-items:center;justify-content:flex-end;padding:0 20px;background:#181818;border-bottom:1px solid var(--border);}
.engine-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dimmer);flex-shrink:0;}
.engine-dot{width:7px;height:7px;border-radius:50%;background:#444;transition:background .3s;}
.engine-dot.ready{background:#5aaa5a;}
.engine-dot.thinking{background:#e8c84a;animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

.topbar-right{display:flex;gap:8px;align-items:center;}
.btn{padding:5px 14px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--dim);font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s;}
.btn:hover{background:var(--panel2);color:var(--text);}
.btn-green{background:var(--green);color:#fff;border-color:var(--green);font-weight:600;}
.btn-green:hover{background:#8aa660;}
.btn-blue{background:#4a90e2;color:#fff;border-color:#4a90e2;font-weight:600;}
.btn-blue:hover{background:#5a9ef0;}



/* ── MAIN LAYOUT ── */
.layout{flex:1;display:flex;align-items:stretch;justify-content:center;gap:14px;padding:10px 16px;min-height:0;overflow:hidden;}

/* ── EVAL BAR ── */
.eval-col{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;padding:2px 0;justify-content:center;}
.eval-num{font-size:10px;font-family:monospace;color:var(--dim);line-height:1.2;text-align:center;}
.eval-num b{display:block;font-size:11px;color:var(--text);}
.eval-track{width:20px;background:#e8e0d0;border-radius:4px;overflow:hidden;}
.eval-black{width:100%;background:#1a1a1a;border-radius:4px 4px 0 0;transition:height .5s ease;}

/* ── BOARD AREA ── */
.board-col{display:flex;flex-direction:column;align-items:center;gap:7px;flex-shrink:0;justify-content:center;}
.pstrip{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--panel);border-radius:7px;border:1px solid #272727;}
.pstrip-avatar{width:24px;height:24px;border-radius:50%;background:var(--panel3);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.pstrip-name{font-size:13px;font-weight:500;}
.pstrip-elo{font-size:11px;color:var(--dim);font-family:monospace;}
.pstrip-clock{margin-left:auto;font-family:monospace;font-size:13px;color:var(--green);background:rgba(119,149,86,0.12);padding:2px 8px;border-radius:4px;}

/* Board wrapper */
.board-wrap{position:relative;}
.board-grid{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);border-radius:3px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.85),0 0 0 3px #151515;}

/* Squares */
.sq{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .08s;}
.sq.light{background:var(--light-sq);}
.sq.dark {background:var(--dark-sq);}
.sq.hl-move{background:rgba(244,251,38,0.75)!important;}
.sq.hl-select{outline:3px inset rgba(100,150,255,0.7);}
.sq.hl-check{background:rgba(250,65,45,0.55)!important;}
.sq.hl-best{background:rgba(100,200,100,0.45)!important;}

/* Legal move dots */
.legal-dot{position:absolute;width:30%;height:30%;border-radius:50%;background:rgba(0,0,0,0.22);z-index:3;pointer-events:none;}
.legal-dot.capture{width:100%;height:100%;border-radius:50%;background:transparent;border:4px solid rgba(0,0,0,0.22);box-sizing:border-box;}

/* Piece */
.piece{width:92%;height:92%;object-fit:contain;cursor:grab;z-index:2;position:relative;filter:drop-shadow(1px 2px 3px rgba(0,0,0,0.4));transition:transform .05s, left 0.2s ease-in-out, top 0.2s ease-in-out;pointer-events:auto;}
.piece:active{cursor:grabbing;transform:scale(1.12);z-index:100;}
.piece.dragging{opacity:0;}

/* Grade badge */
.grade-badge{position:absolute;bottom:-2px;right:-2px;width:34%;height:34%;z-index:6;pointer-events:none;object-fit:contain;filter:drop-shadow(0 1px 4px rgba(0,0,0,0.7));}
.grade-badge.brilliant{animation:glow-brilliant 1.8s ease-in-out infinite;}
.grade-badge.great{animation:glow-great 1.8s ease-in-out infinite;}
@keyframes glow-brilliant{
  0%,100%{filter:drop-shadow(0 1px 4px rgba(0,0,0,0.7)) drop-shadow(0 0 4px rgba(0,187,204,0.0));}
  50%{filter:drop-shadow(0 1px 4px rgba(0,0,0,0.7)) drop-shadow(0 0 10px rgba(0,187,204,0.85));}
}
@keyframes glow-great{
  0%,100%{filter:drop-shadow(0 1px 4px rgba(0,0,0,0.7)) drop-shadow(0 0 4px rgba(107,163,214,0.0));}
  50%{filter:drop-shadow(0 1px 4px rgba(0,0,0,0.7)) drop-shadow(0 0 10px rgba(107,163,214,0.85));}
}

/* Coords */
.coord{position:absolute;font-size:9px;font-weight:700;font-family:monospace;opacity:.7;z-index:1;pointer-events:none;}
.coord-r{top:1px;left:2px;}
.coord-f{bottom:1px;right:2px;}
.sq.light .coord{color:var(--dark-sq);}
.sq.dark  .coord{color:var(--light-sq);}

/* Arrow SVG overlay */
.board-svg{position:absolute;inset:0;pointer-events:none;z-index:10;}

/* Board controls */
.board-nav{display:flex;gap:5px;margin-top:1px;}
.nav-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;}
.nav-btn:hover{background:var(--panel2);color:var(--text);}
.nav-btn.active-mode{background:rgba(119,149,86,0.25);border-color:var(--green);color:var(--green);}

/* Mode badge */
.mode-badge{font-size:11px;padding:3px 9px;border-radius:10px;border:1px solid var(--border2);color:var(--dim);font-weight:500;cursor:pointer;transition:all .15s;}
.mode-badge:hover{color:var(--text);}
.mode-badge.free{border-color:var(--green);color:var(--green);background:rgba(119,149,86,0.1);}

/* Drag ghost */
#dragGhost{position:fixed;width:64px;height:64px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);display:none;}

/* ── SIDEBAR ── */
.sidebar{width:300px;flex-shrink:0;background:var(--panel);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;border:1px solid #2a2a2a;align-self:stretch;}
.sidebar-head{background:#4a90e2;color:#fff;padding:10px 16px;text-align:center;font-weight:700;font-size:14px;flex-shrink:0;}
.tabs{display:flex;background:#252525;padding:4px;gap:3px;flex-shrink:0;}
.tab{flex:1;padding:6px;text-align:center;font-size:12px;cursor:pointer;border-radius:5px;color:var(--dim);transition:all .12s;font-weight:500;}
.tab:hover{color:var(--text);}
.tab.on{background:#363636;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.4);}
.content{flex:1;padding:10px;display:flex;flex-direction:column;gap:8px;overflow:hidden;min-height:0;}

/* Banner */
.banner{background:#252525;padding:8px 10px;border-radius:8px;border-left:4px solid var(--best);display:flex;align-items:center;gap:9px;flex-shrink:0;}
.bicon{font-size:17px;flex-shrink:0;}
.btitle{font-size:13px;font-weight:600;}
.bsub{font-size:11px;color:var(--dim);margin-top:1px;}

/* Analysis view */
#av{display:flex;flex-direction:column;gap:8px;flex:1;min-height:0;overflow:hidden;}
.elines{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.eline{display:flex;gap:7px;align-items:flex-start;font-size:11px;background:rgba(0,0,0,0.2);padding:5px 8px;border-radius:5px;}
.echip{background:#333;color:#fff;padding:2px 5px;border-radius:4px;font-weight:700;font-size:10px;width:36px;text-align:center;flex-shrink:0;font-family:monospace;}
.echip.p{color:#8db065;}
.echip.n{color:#fa412d;}
.emoves{color:var(--dim);font-family:monospace;font-size:11px;line-height:1.5;word-break:break-all;}

/* Progress */
.prog-wrap{background:#252525;border-radius:6px;padding:7px 9px;flex-shrink:0;}
.prog-head{font-size:11px;color:var(--dim);margin-bottom:5px;display:flex;justify-content:space-between;}
.prog-bg{height:3px;background:#333;border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;width:0%;}

/* Notation */
.note-wrap{flex:1;overflow-y:auto;min-height:0;scrollbar-width:thin;scrollbar-color:#333 transparent;}
.note-wrap::-webkit-scrollbar{width:3px;}
.note-wrap::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
.note-grid{display:grid;grid-template-columns:20px 1fr 1fr;gap:2px 4px;}
.note-num{color:var(--dimmer);text-align:right;padding:4px 2px;font-family:monospace;font-size:10px;line-height:1;}
.note-move{display:flex;align-items:center;gap:4px;color:var(--text);font-family:monospace;cursor:pointer;padding:4px 6px;border-radius:4px;border:1px solid transparent;font-size:12px;transition:background .1s;line-height:1;}
.note-move:hover{background:var(--panel2);}
.note-move.on{background:rgba(119,149,86,0.18);border-color:rgba(119,149,86,0.3);color:#8db065;}
.note-move.pending{opacity:.45;}
.note-icon{width:13px;height:13px;object-fit:contain;flex-shrink:0;}

/* Report view */
#rv{display:none;flex-direction:column;gap:10px;flex:1;overflow-y:auto;min-height:0;scrollbar-width:thin;scrollbar-color:#333 transparent;}
#rv::-webkit-scrollbar{width:3px;}
#rv::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
.acc-row{display:flex;border-radius:8px;overflow:hidden;font-weight:700;font-size:16px;}
.acc-w{flex:1;padding:10px;background:#efefef;color:#111;text-align:center;}
.acc-b{flex:1;padding:10px;background:#3a3a3a;color:#fff;text-align:center;}
.acc-sub{display:block;font-size:10px;font-weight:400;opacity:.6;margin-top:2px;}
.stat-table{display:flex;flex-direction:column;gap:3px;}
.stat-row{display:flex;align-items:center;gap:7px;padding:3px 2px;border-radius:4px;}
.stat-row:hover{background:rgba(255,255,255,.03);}
.sicon{width:17px;height:17px;object-fit:contain;flex-shrink:0;}
.sname{font-size:11px;flex:1;}
.sbar-bg{flex:2;height:4px;background:#333;border-radius:2px;overflow:hidden;}
.sbar{height:100%;border-radius:2px;transition:width .5s;}
.sval{width:18px;text-align:center;font-size:11px;font-family:monospace;color:var(--dim);}
.graph-sect{flex-shrink:0;}
.graph-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);margin-bottom:6px;}
#evalChart{width:100%;height:68px;display:block;}

/* Sidebar footer */
.sfooter{display:flex;justify-content:center;gap:20px;padding:10px;border-top:1px solid var(--border);color:#555;font-size:18px;flex-shrink:0;}
.sfooter span{cursor:pointer;transition:color .15s;}
.sfooter span:hover{color:#fff;}

/* ── DRAG GHOST ── */
#dragGhost img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(2px 3px 5px rgba(0,0,0,0.6));}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.on{opacity:1;pointer-events:all;}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:12px;padding:24px;width:460px;max-width:90vw;transform:translateY(8px);transition:transform .2s;}
.modal-bg.on .modal{transform:translateY(0);}
.modal h2{font-size:17px;font-weight:700;margin-bottom:5px;}
.modal p{font-size:12px;color:var(--dim);margin-bottom:13px;}
textarea{width:100%;height:120px;background:var(--panel2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:monospace;font-size:12px;padding:10px;resize:vertical;outline:none;}
textarea:focus{border-color:var(--green);}
.modal-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}

/* Promotion picker */
.promo-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:600;display:none;}
.promo-box{background:var(--panel);border-radius:10px;padding:16px;display:flex;gap:10px;border:1px solid var(--border2);}
.promo-piece{width:64px;height:64px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .12s;}
.promo-piece:hover{background:var(--panel3);}
.promo-piece img{width:88%;height:88%;object-fit:contain;}

/* Toast */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--border2);border-radius:7px;padding:8px 16px;font-size:12px;color:var(--text);z-index:700;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
.toast.on{opacity:1;}
</style>
</head>
<body>

<!-- DRAG GHOST -->
<div id="dragGhost"><img id="ghostImg" src="" alt=""></div>

<!-- PROMOTION PICKER -->
<div class="promo-bg" id="promoBg">
  <div class="promo-box" id="promoBox"></div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-right">
    <div class="engine-status">
      <div class="engine-dot" id="eDot"></div>
      <span id="eText">Loading engine…</span>
    </div>
    <span style="display:none" class="mode-badge" id="modeBadge" onclick="toggleMode()">Review Mode</span>
    <button class="btn" onclick="openModal()">📂 Load PGN</button>
    <button class="btn btn-blue" onclick="newGame()">↺ Reset Board</button>
  </div>
</div>

<!-- ENGINE STATUS (moved to topbar area) -->
<div style="display:none" id="eDot" class="engine-dot"></div>
<span style="display:none" id="eText"></span>

<!-- MAIN -->
<div class="layout">

  <!-- EVAL BAR -->
  <div class="eval-col">
    <div class="eval-num"><b id="etop">0.50</b>B</div>
    <div class="eval-track"><div class="eval-black" id="eblack" style="height:50%"></div></div>
    <div class="eval-num"><b id="ebot">0.50</b>W</div>
  </div>

  <!-- BOARD -->
  <div class="board-col">
    <!-- Black strip -->
    <div class="pstrip" id="bstrip">
      <div class="pstrip-avatar">♟</div>
      <span class="pstrip-name" id="bname">Black</span>
      <span class="pstrip-elo" id="belo"></span>
      <span class="pstrip-clock" id="bclock">—</span>
    </div>

    <div class="board-wrap" id="boardWrap">
      <div class="board-grid" id="boardGrid"></div>
      <svg class="board-svg" id="boardSvg" viewBox="0 0 8 8" preserveAspectRatio="none"></svg>
    </div>

    <!-- White strip -->
    <div class="pstrip" id="wstrip">
      <div class="pstrip-avatar">♙</div>
      <span class="pstrip-name" id="wname">White</span>
      <span class="pstrip-elo" id="welo"></span>
      <div class="board-nav">
        <button class="nav-btn" onclick="goFirst()" title="Start">⏮</button>
        <button class="nav-btn" onclick="goPrev()"  title="Back">◀</button>
        <button class="nav-btn" onclick="goNext()"  title="Forward">▶</button>
        <button class="nav-btn" onclick="goLast()"  title="End">⏭</button>
      </div>
      <span class="pstrip-clock" id="wclock">—</span>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">Game Analysis</div>
    <div class="tabs">
      <div class="tab" id="t-report" onclick="switchTab('report')">Report</div>
      <div class="tab on" id="t-analysis" onclick="switchTab('analysis')">Analysis</div>
    </div>
    <div class="content">

      <div class="banner" id="banner">
        <span class="bicon" id="bicon">♟</span>
        <div>
          <div class="btitle" id="btitle">Load a game to begin</div>
          <div class="bsub"   id="bsub">Use "Sample Game" or paste a PGN</div>
        </div>
      </div>

      <!-- ANALYSIS TAB -->
      <div id="av">
        <div class="elines" id="elines">
          <div style="color:var(--dimmer);font-size:11px;padding:3px">No position loaded.</div>
        </div>
        <div class="prog-wrap" id="progWrap" style="display:none">
          <div class="prog-head"><span>Analysing…</span><span id="progPct">0%</span></div>
          <div class="prog-bg"><div class="prog-fill" id="progFill"></div></div>
        </div>
        <div class="note-wrap">
          <div class="note-grid" id="noteGrid"></div>
        </div>
      </div>

      <!-- REPORT TAB -->
      <div id="rv">
        <div style="text-align:center;font-size:11px;color:var(--dimmer);margin-bottom:-4px">Accuracy</div>
        <div class="acc-row">
          <div class="acc-w"><span id="wacc">—</span><span class="acc-sub">White</span></div>
          <div class="acc-b"><span id="bacc">—</span><span class="acc-sub">Black</span></div>
        </div>
        <div class="stat-table" id="statTable"></div>
        <div class="graph-sect">
          <div class="graph-label">Evaluation</div>
          <canvas id="evalChart"></canvas>
        </div>
      </div>

    </div>
    <div class="sfooter">
      <span onclick="goFirst()">⏮</span>
      <span onclick="goPrev()">◀</span>
      <span onclick="goNext()">▶</span>
      <span onclick="goLast()">⏭</span>
    </div>
  </div>

</div>

<!-- PGN Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>Load PGN</h2>
    <p>Paste your game's PGN notation below to begin analysis.</p>
    <textarea id="pgnInput" placeholder='[White "Magnus Carlsen"]&#10;[Black "Hikaru Nakamura"]&#10;&#10;1. e4 e5 2. Nf3 Nc6 ...'></textarea>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-green" onclick="loadPGN()">Analyse</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════════════
   ASSET MAP  —  put all files in the same folder as this HTML
   ══════════════════════════════════════════════════════════════ */
const IMG = {
  wK:'wk.png', wQ:'wq.png', wR:'wr.png', wB:'wb.png', wN:'wn.png', wP:'wp.png',
  bK:'bk.png', bQ:'bq.png', bR:'br.png', bB:'bb.png', bN:'bn.png', bP:'bp.png',
};
const GRADE_IMG = {
  book:'book.png', brilliant:'Brilliant.png', great:'Great.png',
  best:'best.png', excellent:'excellent.png', good:'good.png',
  inaccuracy:'innacuracy.png', mistake:'mistake.png', blunder:'blunder.png', miss:'miss.png',
};
const GRADE_COLOR = {
  book:'var(--book)', brilliant:'var(--brilliant)', great:'var(--great)',
  best:'var(--best)', excellent:'var(--excellent)', good:'var(--good)',
  inaccuracy:'var(--inaccuracy)', mistake:'var(--mistake)',
  blunder:'var(--blunder)', miss:'var(--miss)',
};
const GRADE_LABEL = {
  book:'Book', brilliant:'Brilliant', great:'Great', best:'Best',
  excellent:'Excellent', good:'Good', inaccuracy:'Inaccuracy',
  mistake:'Mistake', blunder:'Blunder', miss:'Miss',
};
const GRADE_ORDER = ['book','brilliant','great','best','excellent','good','inaccuracy','mistake','blunder','miss'];

/* ══════════════════════════════════════════════════════════════
   PIECE KEY  chess.js uses {color:'w'/'b', type:'p'/'r'...}
   ══════════════════════════════════════════════════════════════ */
function pieceKey(p){ return p.color.toLowerCase() + p.type.toUpperCase(); }



/* ══════════════════════════════════════════════════════════════
   EXPECTED POINTS
   ep() converts centipawns (side-to-move perspective) into win
   probability 0..1. The sigmoid uses 0.003 so the curve is wide
   enough that realistic centipawn swings produce meaningful EP diffs.

   Rough reference points with k=0.003:
     cp=0    → 0.50  (equal)
     cp=100  → 0.73  (slight edge)
     cp=300  → 0.94  (clearly winning)
     cp=600  → 0.99  (winning)

   Grade thresholds (EP lost by the moving side):
     Best        ≤ 0.00  — within rounding of engine top move
     Excellent   ≤ 0.05  — ~5–20 cp loss, strong move
     Good        ≤ 0.10  — ~20–50 cp loss, solid move
     Inaccuracy  ≤ 0.20  — ~50–120 cp loss, slight error
     Mistake     ≤ 0.35  — ~120–300 cp loss, clear error
     Blunder      > 0.35  — game-changing error
   ══════════════════════════════════════════════════════════════ */
function ep(cp){ return 1 / (1 + Math.exp(-0.003 * cp)); }

/* ══════════════════════════════════════════════════════════════
   MOVE GRADING  — getFairGrade
   cpBest      = engine top move eval (side-to-move cp)
   cpPlayed    = played move eval (side-to-move cp)
   isSacrifice = bool from detectSacrifice()
   isOpening   = bool, first 10 plies
   ══════════════════════════════════════════════════════════════ */
function getFairGrade(cpBest, cpPlayed, isSacrifice, isOpening, cpSecond){
  const wpBest   = ep(cpBest);
  const wpPlayed = ep(cpPlayed);
  const wpLoss   = Math.max(0, wpBest - wpPlayed);

  // cpSecond defaults to cpBest if not provided (single line)
  const cpSec = (cpSecond !== undefined) ? cpSecond : cpBest;
  const wpSecond = ep(cpSec);

  // Brilliant: must be a real sacrifice (≥200cp net loss if accepted),
  // AND must be the best or second-best move (wpLoss < 0.02, i.e. within top-2 engine quality)
  // AND the played move must not be clearly worse than the 2nd engine line
  const isTopTwo = wpLoss < 0.02 && (ep(cpPlayed) >= wpSecond - 0.02);
  if(isSacrifice && isTopTwo) return 'brilliant';

  // 1. Great: played the best move AND second-best is at least 15cp worse
  const secondBestGap = cpBest - cpSec;
  if(wpLoss <= 0.01 && secondBestGap >= 15) return 'great';

  // 2. Standard grades based on win probability loss (updated thresholds)
  if(wpLoss <= 0.01)  return 'best';
  if(wpLoss <= 0.04)  return 'excellent';
  if(wpLoss <= 0.09)  return 'good';
  if(wpLoss <= 0.18)  return 'inaccuracy';
  if(wpLoss <= 0.32)  return 'mistake';

  // 3. Miss is handled externally (needs previous move context)
  return 'blunder';
}

function getGradeFromWP(wpLoss){
  if(wpLoss <= 0.01)  return 'best';
  if(wpLoss <= 0.04)  return 'excellent';
  if(wpLoss <= 0.09)  return 'good';
  if(wpLoss <= 0.18)  return 'inaccuracy';
  if(wpLoss <= 0.32)  return 'mistake';
  return 'blunder';
}

/* ══════════════════════════════════════════════════════════════
   STOCKFISH ENGINE WRAPPER
   Handshake pattern from: https://stackoverflow.com/q/77194959
   (CC BY-SA 4.0, Shubhajit Ghosh)
   ══════════════════════════════════════════════════════════════ */
let SF=null, sfReady=false, sfBusy=false;
let sfQueue=[], sfResolve=null, sfLines=[];
const DEPTH=18;

function initSF(){
  try{
    SF=new Worker('stockfish.js');
    SF.onmessage=sfMsg;
    SF.onerror=err=>{
      console.error('Stockfish worker error:',err);
      setEDot('off');
    };
    // Proven handshake sequence
    SF.postMessage('uci');
    SF.postMessage('setoption name Threads value 4');
    SF.postMessage('isready');
    SF.postMessage('ucinewgame');
    setEDot('loading');
  }catch(e){
    setEDot('off');
    console.warn('Stockfish init failed — make sure stockfish.js is in the same folder and you are running via a local server (not file://)');
  }
}

function setEDot(s){
  const d=document.getElementById('eDot');
  const t=document.getElementById('eText');
  d.className='engine-dot';
  if(s==='ready')   { d.classList.add('ready');    t.textContent='Engine ready'; }
  else if(s==='thinking'){ d.classList.add('thinking'); t.textContent='Analysing…'; }
  else if(s==='off'){ t.textContent='No engine — open via local server'; }
  else              { t.textContent='Loading engine…'; }
}

function sfMsg(e){
  const m = typeof e.data==='string' ? e.data : String(e.data);

  // Engine confirmed UCI mode
  if(m==='uciok'){
    SF.postMessage('isready');
    return;
  }

  // Engine is ready — send ucinewgame to reset internal state
  if(m==='readyok'){
    if(!sfReady){
      SF.postMessage('ucinewgame');
      sfReady=true;
      setEDot('ready');
      sfNext();
    }
    return;
  }

  // Collect analysis lines
  if(m.startsWith('info') && m.includes('multipv')){
    const mpvM=m.match(/multipv (\d+)/); if(!mpvM) return;
    const idx=+mpvM[1]-1;
    const cpM  =m.match(/score cp (-?\d+)/);
    const mateM=m.match(/score mate (-?\d+)/);
    const pvM  =m.match(/ pv (.+)/);
    const cp   =mateM ? (+mateM[1]>0?9999:-9999) : (cpM?+cpM[1]:0);
    const pv   =pvM ? pvM[1].trim().split(' ').slice(0,8).join(' ') : '';
    sfLines[idx]={cp,pv};
    return;
  }

  // Engine finished — bestmove signals end of analysis
  if(m.startsWith('bestmove')){
    const parts=m.split(' ');
    const bm=parts[1]&&parts[1]!=='(none)' ? parts[1] : null;
    const res={best:bm, lines:[...sfLines]};
    sfLines=[];
    sfBusy=false;
    setEDot('ready');
    if(sfResolve){ sfResolve(res); sfResolve=null; }
    sfNext();
  }
}

function sfNext(){
  if(!sfReady||sfBusy||!sfQueue.length) return;
  const job=sfQueue.shift();
  sfBusy=true;
  setEDot('thinking');
  sfResolve=job.resolve;
  // Stop any ongoing search, set position, go
  SF.postMessage('stop');
  SF.postMessage('position fen '+job.fen);
  SF.postMessage('go depth '+job.depth+' multipv 2');
}

function sfAnalyse(fen, depth){
  return new Promise(res=>{
    if(!SF){ res({best:null,lines:[]}); return; }
    sfQueue.push({fen, depth:depth||DEPTH, resolve:res});
    sfNext();
  });
}

function sfStop(){
  if(SF) SF.postMessage('stop');
  sfQueue=[]; sfBusy=false; sfResolve=null; sfLines=[];
}

/* ══════════════════════════════════════════════════════════════

function sizeBoard(){
  const lay=document.querySelector('.layout');
  const lh=lay.clientHeight;
  const lw=lay.clientWidth;
  const maxByHeight=lh-90;
  const maxByWidth=lw-300-22-60;
  const avail=Math.min(maxByHeight,maxByWidth);
  const sq=Math.max(200,Math.floor(avail/8)*8);
  const wrap=document.getElementById('boardWrap');
  const grid=document.getElementById('boardGrid');
  wrap.style.width=wrap.style.height=sq+'px';
  grid.style.width=grid.style.height=sq+'px';
  document.querySelectorAll('.pstrip').forEach(el=>el.style.width=sq+'px');
  // Sync eval bar height to board height
  document.querySelector('.eval-track').style.height=sq+'px';
  return sq;
}

/* ══════════════════════════════════════════════════════════════
   DRAW BOARD  (from fens[ply] or liveGame in free mode)
   ══════════════════════════════════════════════════════════════ */
function drawBoard(){
  const grid=document.getElementById('boardGrid');
  const svg =document.getElementById('boardSvg');
  grid.innerHTML=''; svg.innerHTML='';

  const sq=Math.round(parseInt(grid.style.width)||480);
  const cFEN= mode==='free' ? liveGame.fen() : (fens[ply]||fens[0]);
  const tmpChess=new Chess(cFEN);
  const board=tmpChess.board(); // 8x8 array of {type,color}|null
  const files='abcdefgh';

  // Highlight squares — both review and free play
  const prevMove= mode==='review'&&ply>0 ? history[ply-1] : null;
  let hlFrom=null,hlTo=null;
  if(prevMove){
    const uci=prevMove.uci||'';
    if(uci.length>=4){hlFrom=uci.slice(0,2);hlTo=uci.slice(2,4);}
  } else if(mode==='free'&&lastFreeMove){
    hlFrom=lastFreeMove.from;
    hlTo=lastFreeMove.to;
  }

  // King in check?
  let checkSq=null;
  if(tmpChess.in_check()){
    const turn=tmpChess.turn();
    outer:for(let r=0;r<8;r++)for(let c=0;c<8;c++){
      const p=board[r][c];
      if(p&&p.type==='k'&&p.color===turn){checkSq=files[c]+(8-r);break outer;}
    }
  }

  // Best move square (review mode)
  let bestSq=null;
  if(mode==='review'&&prevMove&&prevMove.bestUCI&&
     ['blunder','mistake','inaccuracy','miss'].includes(prevMove.grade)){
    bestSq=prevMove.bestUCI.slice(2,4);
  }

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const sqName=files[c]+(8-r);
      const div=document.createElement('div');
      div.className='sq '+((r+c)%2===0?'light':'dark');
      div.dataset.sq=sqName;

      // Highlights
      if(hlFrom===sqName||hlTo===sqName) div.classList.add('hl-move');
      if(checkSq===sqName) div.classList.add('hl-check');
      if(bestSq===sqName)  div.classList.add('hl-best');
      if(selected&&selected.sq===sqName) div.classList.add('hl-select');

      // Coords
      if(c===0){const sp=document.createElement('span');sp.className='coord coord-r';sp.textContent=8-r;div.appendChild(sp);}
      if(r===7){const sp=document.createElement('span');sp.className='coord coord-f';sp.textContent=files[c];div.appendChild(sp);}

      // Legal-move dots (free play)
      if(selected){
        const lm=selected.legalMoves.find(m=>m.to===sqName);
        if(lm){
          const dot=document.createElement('div');
          const captured=board[r][c];
          dot.className='legal-dot'+(captured?' capture':'');
          div.appendChild(dot);
        }
      }

      // Piece
      const p=board[r][c];
      if(p){
        const key=p.color+p.type.toUpperCase();
        const src=IMG[key];
        if(src){
          const img=document.createElement('img');
          img.className='piece';
          img.src=src; img.alt=key;
          img.dataset.sq=sqName; img.dataset.key=key;
          makeDraggable(img, sqName, p);
          div.appendChild(img);
        }
      }

      // Grade badge (review mode, destination square)
      if(mode==='review'&&prevMove&&hlTo===sqName&&prevMove.grade&&GRADE_IMG[prevMove.grade]){
        const b=document.createElement('img');b.className='grade-badge '+(prevMove.grade||'');
        b.src=GRADE_IMG[prevMove.grade];b.alt=prevMove.grade;div.appendChild(b);
      }

      div.addEventListener('click',()=>onSquareClick(sqName,p));
      grid.appendChild(div);
    }
  }

  // Best move arrow in review mode
  if(bestSq&&prevMove&&prevMove.bestUCI&&prevMove.bestUCI.length>=4){
    drawArrow(svg, prevMove.bestUCI.slice(0,2), prevMove.bestUCI.slice(2,4));
  }

  updateEvalBar();
  updateBanner();
}

/* ══════════════════════════════════════════════════════════════
   ARROW DRAWING
   ══════════════════════════════════════════════════════════════ */
function sqToXY(sqName){
  const files='abcdefgh';
  const c=files.indexOf(sqName[0]);
  const r=8-parseInt(sqName[1]);
  return {x:c+0.5, y:r+0.5};
}

function drawArrow(svg, from, to){
  const f=sqToXY(from), t=sqToXY(to);
  const dx=t.x-f.x, dy=t.y-f.y;
  const len=Math.sqrt(dx*dx+dy*dy);
  if(len===0) return;
  const ux=dx/len, uy=dy/len;
  const headLen=0.4;
  const tx=t.x-ux*headLen, ty=t.y-uy*headLen;
  // Shaft
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',f.x); line.setAttribute('y1',f.y);
  line.setAttribute('x2',tx);  line.setAttribute('y2',ty);
  line.setAttribute('stroke','rgba(100,200,100,0.75)');
  line.setAttribute('stroke-width','0.18');
  line.setAttribute('stroke-linecap','round');
  svg.appendChild(line);
  // Arrowhead
  const perp={x:-uy*0.18,y:ux*0.18};
  const pts=`${tx+perp.x},${ty+perp.y} ${t.x},${t.y} ${tx-perp.x},${ty-perp.y}`;
  const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points',pts);
  poly.setAttribute('fill','rgba(100,200,100,0.85)');
  svg.appendChild(poly);
}

/* ══════════════════════════════════════════════════════════════
   DRAG AND DROP
   ══════════════════════════════════════════════════════════════ */
const ghost=document.getElementById('dragGhost');
const ghostImg=document.getElementById('ghostImg');
let dragging=null; // {sqName, piece_key}

function makeDraggable(img, sqName, pieceObj){
  // Only draggable in free-play mode, or on the current position's turn in review
  img.addEventListener('mousedown', e=>{
    if(mode==='review') return; // use click in review
    const canMove=(mode==='free'&&pieceObj.color===liveGame.turn());
    if(!canMove) return;
    e.preventDefault();
    startDrag(img, sqName, pieceObj, e.clientX, e.clientY);
  });
  img.addEventListener('touchstart', e=>{
    if(mode==='review') return;
    const canMove=(mode==='free'&&pieceObj.color===liveGame.turn());
    if(!canMove) return;
    e.preventDefault();
    const t=e.touches[0];
    startDrag(img, sqName, pieceObj, t.clientX, t.clientY);
  },{passive:false});
}

function startDrag(img, sqName, pieceObj, cx, cy){
  dragging={sqName, key:img.dataset.key};
  img.classList.add('dragging');
  ghostImg.src=img.src;
  ghost.style.display='block';
  ghost.style.left=cx+'px'; ghost.style.top=cy+'px';
  ghost.style.width=ghost.style.height=(img.offsetWidth*1.1)+'px';
  // show legal moves
  const lms=liveGame.moves({square:sqName,verbose:true});
  selected={sq:sqName,piece:pieceObj,legalMoves:lms};
  drawBoard();
}

document.addEventListener('mousemove',e=>{
  if(!dragging) return;
  ghost.style.left=e.clientX+'px'; ghost.style.top=e.clientY+'px';
});
document.addEventListener('touchmove',e=>{
  if(!dragging) return;
  e.preventDefault();
  const t=e.touches[0];
  ghost.style.left=t.clientX+'px'; ghost.style.top=t.clientY+'px';
},{passive:false});

document.addEventListener('mouseup', e=>endDrag(e.clientX,e.clientY));
document.addEventListener('touchend', e=>{
  if(!dragging) return;
  const t=e.changedTouches[0];
  endDrag(t.clientX,t.clientY);
});

function endDrag(cx,cy){
  if(!dragging){ghost.style.display='none';return;}
  ghost.style.display='none';
  // Find drop target
  const fromSq=dragging.sqName;
  dragging=null;
  const el=document.elementFromPoint(cx,cy);
  const sqEl=el?.closest('.sq');
  const toSq=sqEl?.dataset?.sq;
  if(toSq&&toSq!==fromSq){
    tryMove(fromSq,toSq);
  }
  selected=null;
  drawBoard();
}

/* ══════════════════════════════════════════════════════════════
   CLICK-TO-MOVE  (works in both modes for navigation in review)
   ══════════════════════════════════════════════════════════════ */
function onSquareClick(sqName, pieceObj){
  if(mode==='review'){
    // In review mode, clicks on the board navigate or do nothing
    return;
  }
  // Free play
  const myTurn=liveGame.turn();

  // If we have a piece selected
  if(selected){
    // Clicking a legal destination
    const isLegal=selected.legalMoves.find(m=>m.to===sqName);
    if(isLegal){
      tryMove(selected.sq, sqName);
      selected=null; drawBoard(); return;
    }
    // Clicking our own piece — re-select
    if(pieceObj&&pieceObj.color===myTurn){
      const lms=liveGame.moves({square:sqName,verbose:true});
      selected={sq:sqName,piece:pieceObj,legalMoves:lms};
      drawBoard(); return;
    }
    // Clicking empty or enemy without legal move — deselect
    selected=null; drawBoard(); return;
  }

  // No piece selected yet
  if(pieceObj&&pieceObj.color===myTurn){
    const lms=liveGame.moves({square:sqName,verbose:true});
    selected={sq:sqName,piece:pieceObj,legalMoves:lms};
    drawBoard();
  }
}

/* ══════════════════════════════════════════════════════════════
   AUDIO  — priority: check > capture > castle > move
   ══════════════════════════════════════════════════════════════ */
const SFX={};
function loadSFX(name,src){const a=new Audio(src);a.preload='auto';SFX[name]=a;}
function play(name){const a=SFX[name];if(!a)return;const c=a.cloneNode();c.volume=0.55;c.play().catch(()=>{});}

function playMoveSound(flags, isCheck){
  if(isCheck)                                          play('check');
  else if(flags.includes('c')||flags.includes('e'))   play('capture');
  else if(flags.includes('k')||flags.includes('q'))   play('castle');
  else                                                 play('move');
}

/* ══════════════════════════════════════════════════════════════
   MOVE EXECUTION  (free play)
   ══════════════════════════════════════════════════════════════ */
function tryMove(from, to){
  // Check for promotion
  const moves=liveGame.moves({square:from,verbose:true});
  const mv=moves.find(m=>m.to===to);
  if(!mv) return;
  if(mv.flags.includes('p')){
    // Promotion needed
    showPromotion(liveGame.turn(), from, to, promo=>{
      const result=liveGame.move({from,to,promotion:promo});
      if(result){ playMoveSound(result.flags, liveGame.in_check()); addFreeMove(result); drawBoard(); }
    });
  } else {
    const result=liveGame.move({from,to});
    if(result){ playMoveSound(result.flags, liveGame.in_check()); addFreeMove(result); drawBoard(); }
  }
}

function addFreeMove(result){
  lastFreeMove={from:result.from, to:result.to};
  const san=result.san;
  const fenAfter=liveGame.fen();
  history.push({
    san, uci:result.from+result.to+(result.promotion||''),
    fen_before:fens[fens.length-1]||'',
    fen_after:fenAfter,
    grade:null, epB:0.5, epA:0.5, epL:0,
    evalCP:0, bestUCI:null, lines:[], analysed:false
  });
  fens.push(fenAfter);
  ply=history.length;
  sansList=history.map(h=>h.san);
  renderNotation();
  // Queue stockfish analysis for this move
  if(SF){
    const idx      = history.length - 1;
    const fenBefore= fens[fens.length-2];
    const fenAfter = fens[fens.length-1];
    const playedUCI= history[idx].uci;
    sfAnalyse(fenBefore, DEPTH).then(async resBefore => {
      const line1cp  = resBefore.lines[0]?.cp ?? 0;
      const line2cp  = resBefore.lines[1]?.cp ?? line1cp;
      const bestUCI  = resBefore.best || null;
      // Determine cpPlayed
      let cpPlayed;
      const line2UCI = resBefore.lines[1]?.pv?.trim().split(' ')[0] || '';
      if(playedUCI === bestUCI){
        cpPlayed = line1cp;
      } else if(line2UCI && playedUCI === line2UCI){
        cpPlayed = line2cp;
      } else {
        const resAfter = await sfAnalyse(fenAfter, DEPTH);
        cpPlayed = -(resAfter.lines[0]?.cp ?? 0);
      }
      const isSacrifice = detectSacrifice(fenBefore, playedUCI);
      const white = idx % 2 === 0;
      const evalCPwhitePos = white ? cpPlayed : -cpPlayed;
      const epBefore = ep(line1cp);
      const epAfter  = ep(cpPlayed);
      const epLost   = Math.max(0, epBefore - epAfter);
      // Apply book rule for first 12 plies — but only if no prior non-book move broke the sequence
      const wpLossFree = Math.max(0, ep(line1cp) - ep(cpPlayed));
      const bookAlreadyBroken = history.slice(0, idx).some(h => h.grade && h.grade !== 'book');
      let gradeFree;
      if(idx < 12 && wpLossFree < 0.15 && !bookAlreadyBroken){
        gradeFree = 'book';
      } else {
        gradeFree = getFairGrade(line1cp, cpPlayed, isSacrifice, idx < 12, line2cp);
      }
      history[idx].grade    = gradeFree;
      history[idx].epBefore = epBefore;
      history[idx].epAfter  = epAfter;
      history[idx].epLost   = epLost;
      history[idx].evalCP   = evalCPwhitePos;
      history[idx].bestUCI  = bestUCI;
      history[idx].lines    = resBefore.lines || [];
      history[idx].analysed = true;
      updateNoteMove(idx);
      if(ply === idx+1) drawBoard();
    });
  }
}

   ══════════════════════════════════════════════════════════════ */


function loadGame(sans){
  // When a PGN loads, go to analysis tab (free play mode) at move 0
  mode='free';
  lastFreeMove=null;
  selected=null;

  // Build positions using chess.js
  const tmp=new Chess();
  history=[];
  fens=[tmp.fen()];
  for(let i=0;i<sans.length;i++){
    const before=tmp.fen();
    const mv=tmp.move(sans[i]);
    if(!mv) break;
    const after=tmp.fen();
    history.push({
      san:mv.san, uci:mv.from+mv.to+(mv.promotion||''),
      fen_before:before, fen_after:after,
      grade:null, epB:0.5, epA:0.5, epL:0,
      evalCP:0, bestUCI:null, lines:[], analysed:false
    });
    fens.push(after);
  }
  sansList=history.map(h=>h.san);
  ply=history.length; // start at final position
  liveGame=new Chess(fens[ply]||fens[0]);
  renderNotation(); sizeBoard(); drawBoard();
  runAnalysis();
}

/* ══════════════════════════════════════════════════════════════
   SACRIFICE DETECTION
   A move is a sacrifice if:
   1. The piece that moved can be immediately recaptured by the opponent, AND
   2. The net material loss (movingVal - capturedVal) is ≥ 200cp (≈ 2 pawns).

   This correctly handles captures too: Qxr where opponent recaptures loses
   400cp net and qualifies; Qxq loses 0cp net and does not.

   Piece values (centipawns): P=100, N=320, B=330, R=500, Q=900, K=0
   ══════════════════════════════════════════════════════════════ */
const PIECE_VAL = {p:100, n:320, b:330, r:500, q:900, k:0};

function detectSacrifice(fenBefore, uci){
  try {
    const from  = uci.slice(0,2);
    const to    = uci.slice(2,4);
    const chess = new Chess(fenBefore);

    // What piece is moving?
    const movingPiece = chess.get(from);
    if(!movingPiece) return false;
    const movingVal = PIECE_VAL[movingPiece.type] ?? 0;

    // What is on the destination square (if anything)?
    const capturedPiece = chess.get(to);
    const capturedVal   = capturedPiece ? (PIECE_VAL[capturedPiece.type] ?? 0) : 0;

    // Make the move
    const result = chess.move({from, to, promotion: uci[4] || undefined});
    if(!result) return false;

    // Can the opponent immediately recapture on 'to'?
    const opponentMoves = chess.moves({verbose: true});
    const recaptures = opponentMoves.filter(m => m.to === to);

    if(!recaptures.length) return false;

    // Net material loss if opponent recaptures: what we moved minus what we captured.
    // e.g. Qxr then opponent recaptures → we lose 900-500 = 400cp (sacrifice)
    //      Qxq then opponent recaptures → we lose 900-900 = 0cp (not a sacrifice)
    //      Nxp then opponent recaptures → we lose 320-100 = 220cp (sacrifice)
    const netLoss = movingVal - capturedVal;

    // Require at least 200cp (≈2 pawns) of direct material loss if accepted
    return netLoss >= 200;
  } catch(e){
    return false;
  }
}

async function runAnalysis(){
  if(analysisRunning){sfStop();await new Promise(r=>setTimeout(r,200));}
  analysisRunning=true;
  const total=history.length;
  const pw=document.getElementById('progWrap');
  pw.style.display='block';
  let bookBroken = false;  // once a non-book move is played, opening sequence ends

  for(let i=0;i<history.length;i++){
    if(history[i].grade==='book_disabled'){
      history[i].analysed=true;
      updateProgress(i+1,total); updateNoteMove(i); continue;
    }

    // One search per position, multipv 2 so we get top 2 lines
    const res = await sfAnalyse(history[i].fen_before, DEPTH);
    const line1 = res.lines[0] || {cp:0, pv:''};
    const line2 = res.lines[1] || {cp:line1.cp, pv:''};

    // cp values are from side-to-move perspective (higher = better for mover)
    const cpBest    = line1.cp;           // engine's top move cp
    const cpSecond  = line2.cp;           // engine's 2nd best move cp
    const bestUCI   = res.best || null;   // engine top move in UCI

    // Was the played move the engine's top move?
    const playedUCI = history[i].uci;
    const playedIsBest = bestUCI && playedUCI === bestUCI;

    // Find the cp of the played move by comparing UCI to pv lines
    // If the played move matches line1 → cp = cpBest
    // If it matches line2 → cp = cpSecond
    // Otherwise we need to know the eval after the move — use resAfter
    let cpPlayed;
    if(playedIsBest){
      cpPlayed = cpBest;
    } else {
      const line2UCI = line2.pv ? line2.pv.trim().split(' ')[0] : '';
      if(line2UCI && playedUCI === line2UCI){
        cpPlayed = cpSecond;
      } else {
        // Move not in top 2 — analyse after position to get its value
        const resAfter = await sfAnalyse(history[i].fen_after, DEPTH);
        // cpAfter is from opponent's perspective → negate to get mover's value
        cpPlayed = -(resAfter.lines[0]?.cp ?? 0);
      }
    }

    const isSacrifice = detectSacrifice(history[i].fen_before, playedUCI);
    const wpLoss = Math.max(0, ep(cpBest) - ep(cpPlayed));

    // ── BOOK: first 12 plies, wpLoss < 0.15 → always book, no exceptions
    // (brilliant/great are context moves that override book only if criteria met)
    let grade;
    if(!bookBroken && i < 12 && wpLoss < 0.15){
      grade = 'book';
    } else {
      grade = getFairGrade(cpBest, cpPlayed, isSacrifice, i < 12, cpSecond);
      if(i < 12) bookBroken = true;  // non-book move in opening — sequence broken
    }

    // ── MISS: opponent just blundered (wpLoss > 0.20 last move)
    // but we failed to capitalise — override if our move wasn't already bad
    if(i > 0 && !['blunder','mistake','miss'].includes(grade)){
      const prevLost = history[i-1].epLost ?? 0;
      if(prevLost > 0.20 && ep(cpPlayed) < 0.62) grade = 'miss';
    }

    // evalCP stored white-positive for eval bar
    const white = i % 2 === 0;
    // cpPlayed is from the mover's perspective; convert to white-positive:
    // if white moved and got +cpPlayed, white-pos = cpPlayed
    // if black moved and got +cpPlayed, white-pos = -cpPlayed
    const evalCPwhitePos = white ? cpPlayed : -cpPlayed;

    const epBefore = ep(cpBest);
    const epAfter  = ep(cpPlayed);
    const epLost   = Math.max(0, epBefore - epAfter);

    history[i].grade    = grade;
    history[i].epBefore = epBefore;
    history[i].epAfter  = epAfter;
    history[i].epLost   = epLost;
    history[i].evalCP   = evalCPwhitePos;
    history[i].bestUCI  = bestUCI;
    history[i].lines    = res.lines || [];
    history[i].analysed = true;

    updateProgress(i+1, total);
    updateNoteMove(i);
    if(ply === i+1) drawBoard();
  }

  pw.style.display='none';
  analysisRunning=false;
  showToast('Analysis complete ✓');
  if(document.getElementById('rv').style.display==='flex') renderReport();
}



function updateProgress(done,total){
  const pct=Math.round(done/total*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
}

/* ══════════════════════════════════════════════════════════════
   NAVIGATION
   ══════════════════════════════════════════════════════════════ */
function goFirst(){ ply=0; selected=null; lastFreeMove=null; mode='review'; drawBoard(); renderNotation(); renderEngineLines(); }
function goLast() { ply=history.length; selected=null; lastFreeMove=null; mode='review'; drawBoard(); renderNotation(); renderEngineLines(); }
function goPrev() { if(ply>0)ply--; selected=null; lastFreeMove=null; mode='review'; drawBoard(); renderNotation(); renderEngineLines(); }
function goNext() {
  if(ply<history.length){
    const mv=history[ply];
    ply++;
    if(mv&&mv.uci&&mv.uci.length>=4){
      try{
        const tmpC=new Chess(mv.fen_before);
        const uci=mv.uci;
        const result=tmpC.move({from:uci.slice(0,2),to:uci.slice(2,4),promotion:uci[4]||undefined});
        if(result) playMoveSound(result.flags, tmpC.in_check());
        else playMoveSound('n', false);
      }catch(e){ playMoveSound('n', false); }
    }
  }
  selected=null; lastFreeMove=null; mode='review'; drawBoard(); renderNotation(); renderEngineLines();
}

document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')    goPrev();
  if(e.key==='ArrowRight'||e.key==='ArrowDown') goNext();
  if(e.key==='Home') goFirst();
  if(e.key==='End')  goLast();
});

/* ══════════════════════════════════════════════════════════════
   EVAL BAR  — evalCP is white-positive centipawns
   ══════════════════════════════════════════════════════════════ */
function updateEvalBar(){
  const h = ply > 0 ? history[ply-1] : null;
  const cp = (h && h.analysed) ? h.evalCP : 0;
  // Clamp extreme values
  const clamped = Math.max(-1500, Math.min(1500, cp));
  // White win probability from white-positive cp
  const wWin = ep(clamped);
  const blackPct = (1 - wWin) * 100;
  document.getElementById('eblack').style.height = blackPct + '%';
  document.getElementById('etop').textContent = (1 - wWin).toFixed(2);
  document.getElementById('ebot').textContent = wWin.toFixed(2);
}

/* ══════════════════════════════════════════════════════════════
   BANNER
   ══════════════════════════════════════════════════════════════ */
function updateBanner(){
  const el=document.getElementById('banner');
  const ti=document.getElementById('btitle');
  const su=document.getElementById('bsub');
  const ic=document.getElementById('bicon');
  if(!history.length||ply===0){
    el.style.borderLeftColor='var(--best)';
    ic.textContent='♟';ic.style.color='';
    ti.textContent=history.length?'Navigate moves with ◀ ▶':'Load a game to begin';
    ti.style.color='';
    su.textContent=history.length?'Or use arrow keys':'Paste a PGN or start a new game';
    return;
  }
  const h=history[ply-1];
  if(!h.grade){
    el.style.borderLeftColor='#555';
    ic.textContent='…';
    ti.textContent=h.san+' — Analysing…'; ti.style.color='var(--dim)';
    su.textContent='Stockfish is evaluating…';
    return;
  }
  const gc=GRADE_COLOR[h.grade]||'var(--best)';
  el.style.borderLeftColor=gc;
  const icons={book:'📖',brilliant:'!!',great:'!',best:'★',excellent:'✓',good:'✓',inaccuracy:'?!',mistake:'?',blunder:'??',miss:'✕'};
  ic.textContent=icons[h.grade]||'·'; ic.style.color=gc;
  ti.textContent=h.san+' — '+GRADE_LABEL[h.grade]; ti.style.color=gc;
  const who=ply%2===1?'White':'Black';
  if(h.grade==='book') su.textContent='Theory move · '+who;
  else if(h.bestUCI&&['blunder','mistake','inaccuracy','miss'].includes(h.grade)){
    const bestSan=uciPvToSan(h.bestUCI, h.fen_before).split(' ')[0];
    su.textContent='Best: '+(bestSan||h.bestUCI);
  }
  else su.textContent=who+' played '+GRADE_LABEL[h.grade].toLowerCase();
}



/* Convert a UCI pv string like "e2e4 e7e5 g1f3" into SAN "e4 e5 Nf3" */
function uciPvToSan(uciPv, startFen){
  if(!uciPv) return '—';
  const moves=uciPv.trim().split(' ');
  const tmp=new Chess(startFen);
  const sanMoves=[];
  for(const uci of moves){
    if(!uci||uci==='(none)') break;
    const from=uci.slice(0,2), to=uci.slice(2,4), promo=uci[4]||undefined;
    const result=tmp.move({from,to,promotion:promo});
    if(!result) break;
    sanMoves.push(result.san);
  }
  return sanMoves.join(' ')||'—';
}

/* ══════════════════════════════════════════════════════════════
   ENGINE LINES
   ══════════════════════════════════════════════════════════════ */
function renderEngineLines(){
  const el=document.getElementById('elines');
  el.innerHTML='';
  if(!history.length){el.innerHTML='<div style="color:var(--dimmer);font-size:11px;padding:3px">No position loaded.</div>';return;}
  const currentFen=fens[ply];

  const showLines=(lines)=>{
    el.innerHTML='';
    if(!lines||!lines.length){el.innerHTML='<div style="color:var(--dimmer);font-size:11px;padding:3px">Analysing…</div>';return;}
    lines.slice(0,2).forEach(line=>{
      if(!line) return;
      // Convert side-to-move cp to white-positive for display
      const whiteToMove = (new Chess(currentFen)).turn()==='w';
      const cpWhitePos = whiteToMove ? line.cp : -line.cp;
      const clamped = Math.max(-1500, Math.min(1500, cpWhitePos));
      const wWin = ep(clamped);
      const sanLine=uciPvToSan(line.pv, currentFen);
      const div=document.createElement('div'); div.className='eline';
      div.innerHTML=`<div class="echip ${wWin>=0.5?'p':'n'}">${wWin.toFixed(2)}</div><div class="emoves">${sanLine}</div>`;
      el.appendChild(div);
    });
  };

  const h=ply>0?history[ply-1]:null;
  if(h&&h.lines&&h.lines.length) showLines(h.lines);
  else el.innerHTML='<div style="color:var(--dimmer);font-size:11px;padding:3px">Analysing…</div>';

  // Always do a live re-analysis of current position
  if(SF&&sfReady){
    sfAnalyse(currentFen, DEPTH).then(res=>{
      if(fens[ply]===currentFen) showLines(res.lines);
    });
  }
}

/* ══════════════════════════════════════════════════════════════
   NOTATION
   ══════════════════════════════════════════════════════════════ */
function renderNotation(){
  const grid=document.getElementById('noteGrid');
  grid.innerHTML='';
  for(let i=0;i<history.length;i+=2){
    const num=document.createElement('span');num.className='note-num';num.textContent=(i/2+1)+'.';grid.appendChild(num);
    for(let j=i;j<Math.min(i+2,history.length);j++){
      const h=history[j];
      const btn=document.createElement('span');
      btn.className='note-move'+(ply===j+1?' on':'')+(h.analysed?'':' pending');
      if(h.grade&&GRADE_IMG[h.grade]){
        const ico=document.createElement('img');ico.className='note-icon';
        ico.src=GRADE_IMG[h.grade];ico.alt=h.grade;btn.appendChild(ico);
      }
      const txt=document.createElement('span');txt.textContent=h.san;btn.appendChild(txt);
      btn.onclick=(idx=>()=>{
        mode='review';
        ply=idx+1;
        selected=null;
        lastFreeMove=null;
        drawBoard(); renderNotation(); renderEngineLines();
      })(j);
      grid.appendChild(btn);
    }
    if(history.length%2!==0&&i===history.length-1) grid.appendChild(document.createElement('span'));
  }
  const active=grid.querySelector('.note-move.on');
  if(active) active.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function updateNoteMove(j){
  // Re-render just one move button
  const buttons=document.querySelectorAll('.note-move');
  if(buttons[j]){
    const h=history[j];
    const btn=buttons[j];
    btn.classList.remove('pending');
    btn.innerHTML='';
    if(h.grade&&GRADE_IMG[h.grade]){
      const ico=document.createElement('img');ico.className='note-icon';
      ico.src=GRADE_IMG[h.grade];ico.alt=h.grade;btn.appendChild(ico);
    }
    const txt=document.createElement('span');txt.textContent=h.san;btn.appendChild(txt);
  }
}

/* ══════════════════════════════════════════════════════════════
   REPORT
   ══════════════════════════════════════════════════════════════ */
function renderReport(){
  // Accuracy: score each move based on its grade, average per side
  // Scale: best=100, excellent=90, good=75, book=100, great=100,
  //        brilliant=100, inaccuracy=50, mistake=25, blunder=0, miss=20
  const GRADE_SCORE = {
    brilliant:100, great:100, best:100, book:100,
    excellent:90, good:75, inaccuracy:50, mistake:25, miss:20, blunder:0
  };
  const calc = arr => {
    const a = arr.filter(h => h.analysed && h.grade);
    if(!a.length) return '—';
    const avg = a.reduce((s,h) => s + (GRADE_SCORE[h.grade] ?? 50), 0) / a.length;
    return avg.toFixed(1) + '%';
  };
  document.getElementById('wacc').textContent = calc(history.filter((_,i)=>i%2===0));
  document.getElementById('bacc').textContent = calc(history.filter((_,i)=>i%2===1));
  const table=document.getElementById('statTable');
  table.innerHTML='';
  const wC={},bC={};
  GRADE_ORDER.forEach(k=>{wC[k]=0;bC[k]=0;});
  history.forEach((h,i)=>{if(h.grade){if(i%2===0)wC[h.grade]=(wC[h.grade]||0)+1;else bC[h.grade]=(bC[h.grade]||0)+1;}});
  const mx=Math.max(...Object.values(wC),...Object.values(bC),1);
  GRADE_ORDER.forEach(k=>{
    const w=wC[k]||0,b=bC[k]||0;
    if(w+b===0)return;
    const row=document.createElement('div');row.className='stat-row';
    row.innerHTML=`
      <span class="sval" style="color:${GRADE_COLOR[k]}">${w}</span>
      <img class="sicon" src="${GRADE_IMG[k]}" alt="${k}">
      <span class="sname" style="color:${GRADE_COLOR[k]}">${GRADE_LABEL[k]}</span>
      <div class="sbar-bg"><div class="sbar" style="width:${(w+b)/mx/2*100+50}%;background:${GRADE_COLOR[k]}"></div></div>
      <span class="sval" style="color:${GRADE_COLOR[k]}">${b}</span>`;
    table.appendChild(row);
  });
  renderEvalGraph();
}

function renderEvalGraph(){
  const cv=document.getElementById('evalChart');
  const dpr=window.devicePixelRatio||1;
  const W=cv.offsetWidth,H=68;
  cv.width=W*dpr;cv.height=H*dpr;
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const analysed=history.filter(h=>h.analysed);
  if(!analysed.length)return;
  const eps=history.map(h=>h.analysed?ep(Math.max(-1500,Math.min(1500,h.evalCP))):0.5);
  const step=W/(eps.length-1||1),mid=H/2;
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,mid);ctx.lineTo(W,mid);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,mid);
  eps.forEach((e,i)=>ctx.lineTo(i*step,H-e*H));
  ctx.lineTo(W,mid);ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'rgba(141,176,101,0.4)');g.addColorStop(1,'rgba(250,65,45,0.15)');
  ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();
  eps.forEach((e,i)=>{const x=i*step,y=H-e*H;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.strokeStyle='rgba(141,176,101,0.85)';ctx.lineWidth=1.5;ctx.stroke();
  if(ply>0&&eps[ply-1]!==undefined){
    const x=(ply-1)*step,y=H-eps[ply-1]*H;
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle='#8db065';ctx.fill();
  }
}

/* ══════════════════════════════════════════════════════════════
   TAB SWITCHING — auto-toggles mode
   ══════════════════════════════════════════════════════════════ */
function switchTab(t){
  document.getElementById('t-report').classList.toggle('on',t==='report');
  document.getElementById('t-analysis').classList.toggle('on',t==='analysis');
  document.getElementById('av').style.display=t==='analysis'?'flex':'none';
  document.getElementById('rv').style.display=t==='report'?'flex':'none';
  if(t==='report'){
    // Switch to review mode so pieces are locked while reading report
    mode='review';
    selected=null;
    renderReport();
  } else {
    // Switch back to free play when on analysis tab
    mode='free';
    liveGame=new Chess(fens[ply]||new Chess().fen());
    selected=null;
    lastFreeMove=null;
  }
  drawBoard();
}

/* ══════════════════════════════════════════════════════════════
   PGN LOADING
   ══════════════════════════════════════════════════════════════ */
function loadPGN(){
  const raw=document.getElementById('pgnInput').value.trim();
  if(!raw){showToast('Paste a PGN first.');return;}
  const wM=raw.match(/\[White "([^"]+)"\]/);
  const bM=raw.match(/\[Black "([^"]+)"\]/);
  const wE=raw.match(/\[WhiteElo "([^"]+)"\]/);
  const bE=raw.match(/\[BlackElo "([^"]+)"\]/);
  if(wM)document.getElementById('wname').textContent=wM[1];
  if(bM)document.getElementById('bname').textContent=bM[1];
  if(wE)document.getElementById('welo').textContent=wE[1];
  if(bE)document.getElementById('belo').textContent=bE[1];
  // Parse moves
  const cleaned=raw.replace(/\[.*?\]/gs,'').replace(/\{[^}]*\}/g,'')
    .replace(/\d+\.\.\./g,'').replace(/\d+\./g,'')
    .replace(/1-0|0-1|1\/2-1\/2|\*/g,'').trim();
  const sans=cleaned.split(/\s+/).filter(s=>s&&!/^\s*$/.test(s)).map(s=>s.replace(/[!?]/g,''));
  if(!sans.length){showToast('No moves found in PGN.');return;}
  loadGame(sans);
  closeModal();
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3000);}
